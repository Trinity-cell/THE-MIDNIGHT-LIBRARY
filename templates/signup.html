<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — The Midnight Library</title>

    <style>

        body{
            margin:0;
            font-family:'Georgia', serif;
            background-color:#0f172a;
            color:#e5e7eb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:#020617;
            padding:40px;
            border-radius:12px;
            width:400px;
            border:1px solid #1e293b;
            box-shadow:0 10px 25px rgba(0,0,0,0.6);
            text-align:center;
        }

        h1{
            margin-bottom:10px;
            letter-spacing:1px;
        }

        p{
            color:#94a3b8;
            margin-bottom:30px;
        }

        .contact-box{
            background:#0f172a;
            border:1px solid #1e293b;
            border-radius:10px;
            padding:20px;
            margin-bottom:20px;
        }

        .label{
            color:#38bdf8;
            font-size:0.9rem;
            margin-bottom:8px;
            text-transform:uppercase;
            letter-spacing:1px;
        }

        .info{
            font-size:1.1rem;
            word-break:break-word;
        }

        .back{
            margin-top:20px;
        }

        .back a{
            color:#94a3b8;
            text-decoration:none;
        }

        .back a:hover{
            color:#38bdf8;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Contact the Library</h1>

    <p>
        Entry is not requested lightly.  
        Reach out only if your curiosity persists after midnight.
    </p>

    <div class="contact-box">
        <div class="label">Email</div>
        <div class="info">atthelibraryatmidnight@email.com</div>
    </div>

    <div class="contact-box">
        <div class="label">Phone</div>
        <div class="info">+256 741 895 330</div>
    </div>

    <div class="back">
        <a href="/">Return to the Library</a>
    </div>

</div>

</body>
</html>
